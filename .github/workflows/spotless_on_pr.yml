name: spotless_on_pr.yml
on:
  workflow_dispatch:
  pull_request:
    branches: [ "develop" ]
  push:
    branches: # Specify your branches here
      - develop # The 'develop' branch

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 24
      - run: mvn install
      - run: mvn spotless:apply