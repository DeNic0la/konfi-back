services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
        - MYSQL_ROOT_HOSTS=%
        - MYSQL_ALLOW_EMPTY_PASSWORD=1
        - MYSQL_DATABASE=mydatabase
        - MYSQL_PASSWORD=secret
        - MYSQL_ROOT_PASSWORD=verysecret
        - MYSQL_USER=myuser
    volumes:
        - ./docker/volume_mysql:/var/lib/mysql

