spring:
  flyway:
    enabled: true
    locations: filesystem:data
  jpa:
    hibernate:
      ddl-auto: "none"
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  datasource:
    url: "jdbc:mysql://localhost:3306/mydatabase"
    driverClassName: com.mysql.jdbc.Driver
    username: myuser
    password: secret
  security:
    enabled: true
management:
  endpoints:
    web:
      base-path: /actuator
logging:
  level:
    ch: debug
    sql: error
    web: info
#debug: true
server:
  error:
    whitelabel:
      enabled: false