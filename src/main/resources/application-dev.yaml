spring:
  jpa:
    hibernate:
      ddl-auto: "create"
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  datasource:
    url: "jdbc:mysql://localhost:3306/mydatabase"
    driverClassName: com.mysql.jdbc.Driver
    username: myuser
    password: secret
  security:
    enabled: false
security:
  basic:
    enabled: false
managment:
  security:
    enabled: false
